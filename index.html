<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sebastian Haugland – Scouting Report</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Inter, sans-serif; background:#020617; color:#e2e8f0;}
.card { background:#0f172a; border-radius:20px; padding:28px;}
.stat-number { font-size:2.8rem; font-weight:700;}
</style>
</head>

<body>

<div class="max-w-5xl mx-auto px-6 py-12">

<h1 class="text-5xl font-bold">Sebastian Haugland</h1>
<p class="text-emerald-400 text-2xl">Centre Forward • IL Hødd</p>

<!-- RADAR -->
<div class="card mt-10">
<h2 class="text-xl mb-4">Attribute Profile</h2>
<canvas id="radarChart"></canvas>
</div>

<!-- BUTTON -->
<div class="mt-10 text-center">
<button onclick="generatePDF()" class="bg-emerald-500 px-6 py-3 rounded-xl text-black">
Download PDF
</button>
</div>

</div>

<script>

// ✅ RADAR (FIXED)
const radarChart = new Chart(document.getElementById("radarChart"), {
    type: "radar",
    data: {
        labels: ["Finishing","xG Efficiency","Duels","Recoveries","Box","Dribbling","Pressing","Passing"],
        datasets: [
            {
                label: "Haugland",
                data: [88,92,82,78,87,62,80,67],
                borderColor: "#10b981",
                backgroundColor: "rgba(16,185,129,0.3)"
            },
            {
                label: "Average",
                data: [65,55,62,55,68,55,60,60],
                borderColor: "#94a3b8",
                borderDash: [4,4]
            }
        ]
    },
    options: {
        plugins: {
            legend: { labels: { color:"#e2e8f0" } }
        },
        scales: {
            r: {
                min:0,
                max:100,
                grid:{ color:"#1e293b"},
                pointLabels:{ color:"#cbd5e1"},
                ticks:{ display:false}
            }
        }
    }
});


// ✅ PDF (FULLY FIXED)
function generatePDF() {

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let y = 20;

const addSection = (title, text) => {
    doc.setFont("Helvetica","bold");
    doc.setFontSize(14);
    doc.text(title,20,y);
    y+=8;

    doc.setFont("Helvetica","normal");
    doc.setFontSize(11);

    const lines = doc.splitTextToSize(text,170);
    doc.text(lines,20,y);

    y += lines.length*6 + 10;
};

// HEADER
doc.setFontSize(18);
doc.text("Sebastian Haugland – Scouting Report",20,y);
y+=10;

doc.setFontSize(11);
doc.text("Centre Forward • IL Hødd • March 2026",20,y);
y+=15;

// CONTENT
addSection("Executive Summary",
"High-efficiency, low-volume striker. Output driven by finishing. Adds value through pressing and duels. Role-dependent at higher level.");

addSection("Profile",
"0.50 goals/90 from ~0.30 xG. Indicates strong finishing but low creation involvement.");

addSection("Strengths",
"• Finishing\n• Positioning\n• Duels\n• Pressing");

addSection("Weaknesses",
"• Low volume\n• Limited link-up\n• Dependent on service");


// NEW PAGE → VISUALS
doc.addPage();

// RADAR SAFE EXPORT
let radarImage;
try {
    radarImage = radarChart.toBase64Image();
} catch(e) {
    console.log("Radar fail", e);
}

if (radarImage) {
    doc.text("Attribute Profile",20,20);
    doc.addImage(radarImage,"PNG",15,30,180,120);
}


// FINAL PAGE
doc.addPage();
y=20;

addSection("Projection",
"8–13 goals at Eliteserien level depending on system.");

addSection("Final Assessment",
"Role striker. Efficiency-driven output. Needs structure.");

// SAVE
doc.save("Haugland_Report.pdf");

}

</script>

</body>
</html>
